<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danawa Sound Master - 실시간 최저가 비교</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>📊 Danawa Sound Master</h1>
        <div class="header-controls">
            <button id="darkModeBtn" onclick="toggleDarkMode()">🌙 테마 변경</button>
            <button onclick="toggleWishlist()">❤️ 장바구니 (<span id="wishCount">0</span>)</button>
        </div>
    </header>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="모델명 입력 후 'Enter'를 누르면 실시간 검색됩니다..." onkeypress="handleSearchKeyPress(event)">
        
        <select id="categoryFilter" onchange="triggerSearch(false)">
            <option value="all">전체 카테고리</option>
            <option value="speaker">🔊 스피커</option>
            <option value="headset">🎧 헤드셋</option>
            <option value="earphone">🎵 이어폰</option>
            <option value="mic">🎙️ 마이크</option>
            <option value="turntable">📻 LP판 플레이어</option>
        </select>

        <select id="sortEngine" onchange="triggerSearch(false)">
            <option value="rank">다나와 추천 순위</option>
            <option value="price_asc">최저가순 정렬</option>
            <option value="price_desc">최고가순 정렬</option>
        </select>
    </div>

    <div id="wishlistModal" style="display:none; border:2px solid #ff6b6b; padding:20px; margin: 20px 0; border-radius: 8px;">
        <h2>🛒 장바구니 견적서</h2>
        <ul id="wishlistItems" style="line-height: 1.8; padding-left: 20px;"></ul>
        <hr style="margin: 15px 0;">
        <h3>예산 총계: <span id="totalPrice" style="color: #e63946;">0</span>원</h3>
    </div>

    <div id="productGrid" class="grid-container"></div>

    <script src="script.js"></script>
</body>
</html>
